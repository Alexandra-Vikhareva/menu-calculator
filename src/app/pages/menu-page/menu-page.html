<div class="menu-page">
    <app-sidebar
        [menus]="menuSets()"
        [selectedId]="selectedMenuId()"
        (menuSelected)="selectedMenuId.set($event)">
    </app-sidebar>


    <div class="menu-page__content">
        <div class="menu-page__header">
            <h2>{{ currentName() }}</h2>
            <p class="menu-page__stats">
                Выбрано позиций: <strong>{{ selectedCount() }}</strong><br>
                Общая сумма: <strong>{{ totalValue() | number:'1.0-2'}} {{currentMenu()?.unit}}</strong>
            </p>
        </div>
        
        <ul class="menu-page__list">
            @for (item of currentItems(); track item.id) {
                <li class="menu-item">
                    <label class="menu-item__label">
                        <input class="menu-item__checkbox"
                                type="checkbox"
                                [checked]="item.isChecked"
                                (change)="onCheckboxChange(item, $event)">
                        <div class="menu-item__info">
                            <span class="menu-item__item-name">{{ item.name }}</span>
                            <span class="menu-item__item-value">{{ item.value }} {{currentMenu()?.unit}}</span>
                        </div>
                    </label>
                </li>
            }
        </ul>
    </div>

</div>
