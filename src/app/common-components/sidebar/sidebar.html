<aside class="sidebar">
      <h1 class="sidebar__title">Меню</h1>
      <ul class="sidebar__list">
        @for (menu of menus; track menu.id) {
          <li class="sidebar__item">
            <button class="sidebar__button" 
                    [class.sidebar__button--active]="menu.id === selectedId"
                    (click)="selectMenu(menu.id)">
              {{ menu.name }}
            </button>
          </li>
        }  
        <li class="sidebar__item">
            <a class="sidebar__button back" href="">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.1912 1.90735e-06L12.6119 1.4206L3.695 10.3375C3.4532 10.5793 3.6345 11.0025 3.9972 11.0025L24.0073 11.0025L24.0073 12.9974L3.9972 12.9974C3.6345 12.9974 3.4532 13.4206 3.7252 13.6927L12.6119 22.5793L11.1912 24C11.1912 24 0.8234 13.6322 0.5816 13.4206C-0.2043 12.6347 -0.2043 11.3954 0.5816 10.6095C0.8234 10.3677 11.1912 1.90735e-06 11.1912 1.90735e-06Z" 
                  fill="black"/> 
              </svg> На главную
            </a>
          </li>
      </ul>
</aside>
